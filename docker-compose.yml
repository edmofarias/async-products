services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: async-products-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async-products-api
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - /app/node_modules
      - ./data:/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/data/products.db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async-products-worker
    command: ["npx", "tsx", "src/worker.ts"]
    volumes:
      - ./src:/app/src
      - /app/node_modules
      - ./data:/data
    environment:
      - NODE_ENV=development
      - DB_PATH=/data/products.db
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: async-products-web
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    depends_on:
      - api
    environment:
      - NODE_ENV=development
